<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>物理贴贴 · 星云螺旋闯关</title>
    <style>
        :root {
            --gold: #f0c040; --warm: #fff8ed; --card-bg: #fffaf0; --btn-gold: #e8a838;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #0a1a3a; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .app { width: 100%; max-width: 500px; height: 100vh; max-height: 950px; position: relative; overflow: hidden; background: #fef7e0; box-shadow: 0 0 60px rgba(100,160,220,0.4); border-radius: 16px; }
        .screen { position: absolute; inset:0; display:flex; flex-direction:column; width:100%; height:100%; overflow-y:auto; }
        .screen.hidden { display:none !important; }
        .login-screen, .cover-screen { background: radial-gradient(ellipse at 50% 50%, #1a3a6a 0%, #0e2245 30%, #0a1a3a 55%, #060e20 100%); z-index:30; align-items:center; justify-content:center; text-align:center; overflow:hidden; position:relative; }
        .cover-screen { z-index:20; padding:15px 0; }
        .cosmic-bg { position:absolute; inset:0; pointer-events:none; }
        .star-particle { position:absolute; background:#fff; border-radius:50%; animation: starPulse var(--d) ease-in-out infinite; animation-delay: var(--dl); }
        @keyframes starPulse { 0%,100%{opacity:0.3;transform:scale(0.6)} 50%{opacity:1;transform:scale(1.5)} }
        .shooting-star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; animation: shoot 3s linear infinite; animation-delay: var(--dl); box-shadow:0 0 8px 2px rgba(255,255,255,0.6); }
        @keyframes shoot { 0%{transform:translate(0,0);opacity:1} 30%{opacity:1} 100%{transform:translate(-200px,120px);opacity:0} }
        .nebula-glow { position:absolute; border-radius:50%; filter:blur(40px); opacity:0.25; pointer-events:none; }
        .ng1{width:180px;height:100px;background:#2a5a9a;top:10%;left:15%}.ng2{width:140px;height:80px;background:#1a4080;top:55%;right:10%}.ng3{width:120px;height:70px;background:#3a3060;bottom:15%;left:20%}
        .spiral-container { position:relative; width:100%; max-width:420px; height:420px; margin:0 auto; flex-shrink:0; }
        .spiral-track { position:absolute; inset:0; border-radius:50%; border:1px dashed rgba(255,215,0,0.15); animation: trackRotate 30s linear infinite; }
        .spiral-track:nth-child(1){width:100%;height:100%;top:0;left:0}.spiral-track:nth-child(2){width:82%;height:82%;top:9%;left:9%;animation-duration:25s;animation-direction:reverse}.spiral-track:nth-child(3){width:64%;height:64%;top:18%;left:18%;animation-duration:20s}.spiral-track:nth-child(4){width:46%;height:46%;top:27%;left:27%;animation-duration:18s;animation-direction:reverse}
        @keyframes trackRotate { 100%{transform:rotate(360deg)} }
        .center-core { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:50px; height:50px; border-radius:50%; background:radial-gradient(circle,#fff8c0 0%,#e8a838 30%,#c08020 70%,transparent 100%); box-shadow:0 0 30px rgba(240,192,64,0.6),0 0 60px rgba(240,180,40,0.3); animation:corePulse 2s ease-in-out infinite; z-index:10; }
        @keyframes corePulse { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.2)} }
        .planet-spiral { position:absolute; width:52px; height:52px; border-radius:50%; cursor:pointer; transition:0.3s; display:flex; align-items:center; justify-content:center; box-shadow:0 0 15px rgba(0,0,0,0.3); z-index:5; animation:planetOrbit var(--orbit-speed) linear infinite; }
        .planet-spiral:hover { transform:scale(1.2); filter:brightness(1.4); z-index:15; }
        .planet-spiral.locked { opacity:0.35; cursor:not-allowed; filter:grayscale(0.7); }
        .planet-spiral.locked:hover { transform:none; filter:grayscale(0.7); }
        .planet-spiral.completed { box-shadow:0 0 20px gold,0 0 40px rgba(255,215,0,0.4); animation-play-state:paused; }
        .planet-label-spiral { position:absolute; bottom:-18px; left:50%; transform:translateX(-50%); font-size:0.5em; font-weight:bold; color:#ffd966; white-space:nowrap; text-shadow:0 0 6px rgba(0,0,0,0.6); pointer-events:none; }
        @keyframes planetOrbit { 0%{transform:rotate(0deg) translateX(var(--orbit-radius)) rotate(0deg)} 100%{transform:rotate(360deg) translateX(var(--orbit-radius)) rotate(-360deg)} }
        .ps-earth{background:radial-gradient(circle at 38% 35%,#5baee8,#1a6090,#0a3050)}
        .ps-moon{background:radial-gradient(circle at 40% 35%,#d8d8d8,#909090,#505050)}
        .ps-mars{background:radial-gradient(circle at 40% 35%,#e07050,#a03020,#601010)}
        .ps-jupiter{background:radial-gradient(circle at 40% 35%,#e8c888,#c09050,#a07030,#604020)}
        .ps-saturn{background:radial-gradient(circle at 40% 35%,#f0d890,#d0b060,#906830)}
        .ps-uranus{background:radial-gradient(circle at 40% 35%,#a0d8e8,#4088a0,#205060)}
        .ps-neptune{background:radial-gradient(circle at 40% 35%,#6088e0,#2040a0,#102060)}
        .ps-kepler{background:radial-gradient(circle at 40% 35%,#c080e0,#7040a0,#402060)}
        .login-screen input, .cover-screen input { display:block; width:80%; max-width:260px; margin:10px auto; padding:12px; border-radius:24px; border:2px solid var(--gold); font-size:1rem; text-align:center; background:rgba(255,255,255,0.9); position:relative; z-index:20; }
        .login-screen button, .cover-screen button { background:var(--gold); color:#1a1000; border:none; padding:12px 32px; border-radius:30px; font-weight:bold; cursor:pointer; font-size:1rem; margin:4px; position:relative; z-index:20; }
        .login-screen .admin-link { color:#ffd966; font-size:0.85em; cursor:pointer; text-decoration:underline; margin-top:10px; display:inline-block; position:relative; z-index:20; }
        .login-screen h2, .cover-screen h2 { color:#ffd966; position:relative; z-index:20; font-size:1.2em; }
        .title h1 { font-size:1.6em; background:linear-gradient(#ffeaa7,#e8a838,#c08020); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin:0; position:relative; z-index:20; }
        .title p, .tab-bar { position:relative; z-index:20; }
        .game-screen { background:var(--warm); z-index:15; }
        .rank-screen { background:var(--warm); z-index:15; overflow-y:auto; padding:16px; }
        .stairs-panel { padding:18px; text-align:center; }
        .stair-btn { display:inline-block; padding:10px 16px; margin:5px; border-radius:18px; border:2px solid #e0c8a0; background:var(--card-bg); cursor:pointer; font-weight:bold; font-size:0.95rem; color:#5a4020; transition:0.15s; }
        .stair-btn.done { background:#5ec49a; color:#fff; border-color:#5ec49a; }
        .stair-btn.locked { background:#ddd; color:#aaa; cursor:not-allowed; }
        .top-bar { background:#f5e6c8; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; gap:5px; flex-wrap:wrap; border-bottom:2px solid #d4b88c; }
        .badge { padding:5px 12px; border-radius:14px; font-weight:bold; font-size:0.8em; }
        .badge.room { background:var(--btn-gold); color:#fff; } .badge.stair { color:#5a4020; flex:1; text-align:center; font-size:0.85em; }
        .badge.score { background:#e0d0b0; } .badge.moves { background:#d97060; color:#fff; }
        .stage-dots { display:flex; gap:6px; padding:6px 14px; justify-content:center; background:#fef3d4; flex-wrap:wrap; }
        .stage-dot { width:24px; height:24px; border-radius:50%; background:#e0c8a0; display:flex; align-items:center; justify-content:center; font-size:0.75em; }
        .stage-dot.done { background:#5ec49a; color:#fff; } .stage-dot.current { background:var(--btn-gold); color:#fff; box-shadow:0 0 10px var(--btn-gold); }
        .stage-dot.locked { background:#ddd; color:#aaa; }
        .card-grid { flex:1; overflow-y:auto; padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:16px; background:#fef3d4; align-content:start; }
        .pcard { background:var(--card-bg); border-radius:20px; min-height:90px; display:flex; align-items:center; justify-content:center; text-align:center; font-weight:700; font-size:1rem; padding:12px 6px; border:2px solid #e0c8a0; cursor:pointer; transition:0.1s; box-shadow:0 4px 0 rgba(0,0,0,0.05); word-break:break-word; position:relative; }
        .pcard:active { transform:translateY(2px); } .pcard.selected { border-color:var(--btn-gold)!important; background:#fff4d8; box-shadow:0 0 18px rgba(232,168,56,0.5); }
        .pcard.eliminated { visibility:hidden; opacity:0; transform:scale(0.7); transition:0.3s; }
        .pcard.hint-glow { animation: hint 0.6s ease-in-out 3; border-color:#ffd700!important; }
        @keyframes hint { 0%,100%{box-shadow:0 0 8px gold} 50%{box-shadow:0 0 28px gold} }
        .dock { background:#f5e6c8; padding:10px; display:flex; gap:6px; justify-content:center; flex-wrap:wrap; border-top:2px solid #d4b88c; }
        .itm { background:var(--card-bg); border:1px solid #c0a878; padding:9px 14px; border-radius:20px; font-size:0.78em; cursor:pointer; display:flex; align-items:center; gap:4px; }
        .cnt { background:var(--btn-gold); color:#fff; border-radius:8px; padding:2px 7px; font-size:0.7em; font-weight:bold; }
        .rank-item { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--card-bg); border-radius:16px; margin:8px 0; border:1px solid #e0c8a0; }
        .rank-num { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9em; }
        .rank-num.gold{background:#ffd700;color:#5a4020}.rank-num.silver{background:#c0c0c0;color:#333}.rank-num.bronze{background:#cd7f32;color:#fff}
        .rank-num.normal{background:#e0c8a0;color:#5a4020}.rank-name{flex:1;font-weight:bold;color:#4b3a2a;font-size:0.9em}.rank-score{color:var(--btn-gold);font-weight:bold;font-size:0.95em}
        .admin-panel { padding:16px; background:var(--card-bg); border-radius:16px; margin:16px 0; border:2px solid #d97060; }
        .admin-panel button { background:#d97060; color:#fff; border:none; padding:7px 14px; border-radius:10px; margin:3px; cursor:pointer; font-size:0.8em; }
        .admin-panel input { padding:8px; border-radius:10px; border:1px solid #c0a878; margin:3px; }
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--btn-gold);color:#1a1000;padding:10px 24px;border-radius:22px;z-index:200;animation:slide 0.3s;font-size:0.9em}
        @keyframes slide{from{opacity:0;transform:translateX(-50%) translateY(20px)}}
        .modal{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:30}
        .modal-box{background:var(--card-bg);padding:24px;border-radius:22px;text-align:center;max-width:300px;width:85%;border:2px solid var(--btn-gold)}
        .modal-box button{background:var(--btn-gold);color:#1a1000;border:none;padding:10px 22px;border-radius:20px;margin:4px;font-weight:bold;cursor:pointer;font-size:0.9em}
        .combo-pop{position:fixed;left:50%;top:40%;transform:translate(-50%,-50%);font-size:2.5rem;font-weight:900;color:var(--btn-gold);text-shadow:0 0 18px rgba(232,168,56,0.8);animation:comboAnim 0.8s ease-out forwards;pointer-events:none;z-index:250}
        @keyframes comboAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}
        .tab-bar{display:flex;gap:8px;padding:8px 14px;justify-content:center}
        .tab-btn{padding:8px 18px;border-radius:16px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);cursor:pointer;font-weight:bold;font-size:0.85em;color:#fff}
        .tab-btn.active{background:var(--btn-gold);color:#1a1000;border-color:var(--btn-gold)}
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="screen login-screen" id="loginScreen">
        <div class="cosmic-bg" id="loginCosmicBg"></div>
        <div class="nebula-glow ng1"></div><div class="nebula-glow ng2"></div>
        <h2 style="position:relative;z-index:20;">🔐 物理学家昵称</h2>
        <input type="text" id="nicknameInput" placeholder="例如：爱因斯坦">
        <button id="btnLogin">🏛️ 进入星云螺旋</button>
        <div class="admin-link" id="adminLink">🔑 管理员入口</div>
    </div>
    <div class="screen login-screen hidden" id="adminLoginScreen">
        <div class="cosmic-bg" id="adminCosmicBg"></div>
        <div class="nebula-glow ng3"></div>
        <h2 style="position:relative;z-index:20;">🔑 管理员登录</h2>
        <input type="password" id="adminPasswordInput" placeholder="请输入管理密码">
        <button id="btnAdminLogin">确认</button>
        <button id="btnBackUser" style="background:transparent;border:1px solid rgba(255,255,255,0.4);color:#ffd966;">返回</button>
    </div>
    <div class="screen cover-screen hidden" id="coverScreen">
        <div class="cosmic-bg" id="coverCosmicBg"></div>
        <div class="nebula-glow ng1"></div><div class="nebula-glow ng2"></div><div class="nebula-glow ng3"></div>
        <div class="spiral-container">
            <div class="spiral-track"></div><div class="spiral-track"></div><div class="spiral-track"></div><div class="spiral-track"></div>
            <div class="center-core"></div>
            <div class="planet-spiral ps-earth" style="top:50%;left:50%;--orbit-radius:65px;--orbit-speed:12s;animation-delay:0s;" data-room="0"><span class="planet-label-spiral">伽利略</span></div>
            <div class="planet-spiral ps-moon" style="top:50%;left:50%;--orbit-radius:65px;--orbit-speed:12s;animation-delay:-6s;" data-room="1"><span class="planet-label-spiral">牛顿</span></div>
            <div class="planet-spiral ps-mars" style="top:50%;left:50%;--orbit-radius:100px;--orbit-speed:16s;animation-delay:-3s;" data-room="2"><span class="planet-label-spiral">阿基米德</span></div>
            <div class="planet-spiral ps-jupiter" style="top:50%;left:50%;--orbit-radius:100px;--orbit-speed:16s;animation-delay:-11s;" data-room="3"><span class="planet-label-spiral">帕斯卡</span></div>
            <div class="planet-spiral ps-saturn" style="top:50%;left:50%;--orbit-radius:135px;--orbit-speed:20s;animation-delay:-5s;" data-room="4"><span class="planet-label-spiral">欧姆</span></div>
            <div class="planet-spiral ps-uranus" style="top:50%;left:50%;--orbit-radius:135px;--orbit-speed:20s;animation-delay:-15s;" data-room="5"><span class="planet-label-spiral">法拉第</span></div>
            <div class="planet-spiral ps-neptune" style="top:50%;left:50%;--orbit-radius:168px;--orbit-speed:25s;animation-delay:-8s;" data-room="6"><span class="planet-label-spiral">焦耳</span></div>
            <div class="planet-spiral ps-kepler" style="top:50%;left:50%;--orbit-radius:168px;--orbit-speed:25s;animation-delay:-20s;" data-room="7"><span class="planet-label-spiral">爱因斯坦</span></div>
        </div>
        <div class="title"><h1>物理贴贴</h1></div>
        <p style="color:#ffd966;font-size:0.85em;position:relative;z-index:20;">欢迎，<span id="welcomeUser"></span>！<span id="adminBadge" style="color:#ffd966;display:none;">[管理员]</span></p>
        <p style="color:#aac;font-size:0.7em;position:relative;z-index:20;">547组知识配对 · 物理量/单位/符号/公式全覆盖</p>
        <div class="tab-bar">
            <button class="tab-btn active" id="tabGame">🏛️ 星云螺旋</button>
            <button class="tab-btn" id="tabRank">🏆 排行榜</button>
        </div>
        <button id="btnLogout" style="background:transparent;border:1px solid rgba(255,255,255,0.3);color:#ffd966;padding:7px 16px;border-radius:16px;cursor:pointer;margin-top:8px;position:relative;z-index:20;">切换账号</button>
    </div>
    <div class="screen rank-screen hidden" id="rankScreen">
        <h2 style="text-align:center;color:#5a4020;padding:16px;">🏆 学霸排行榜</h2>
        <div id="rankList"></div><div id="adminPanelContainer"></div>
        <button id="btnBackCover" style="display:block;margin:16px auto;background:var(--btn-gold);color:#1a1000;border:none;padding:11px 26px;border-radius:20px;cursor:pointer;font-weight:bold;">返回星云螺旋</button>
    </div>
    <div class="screen rank-screen hidden" id="stairsPanelScreen">
        <div class="stairs-panel" id="stairsPanelContent"></div>
        <button id="btnBackFromStairs" style="display:block;margin:16px auto;background:var(--btn-gold);color:#1a1000;border:none;padding:11px 26px;border-radius:20px;cursor:pointer;font-weight:bold;">返回星云螺旋</button>
    </div>
    <div class="screen game-screen hidden" id="gameScreen">
        <div class="top-bar">
            <span class="badge room" id="roomTag"></span><span class="badge stair" id="stairTag"></span>
            <span class="badge score">🏆<span id="scoreVal">0</span></span>
            <span class="badge moves">👟<span id="movesVal">8</span></span>
            <button class="itm" id="btnBackHome" style="background:var(--btn-gold);color:#fff;">🏠</button>
        </div>
        <div class="stage-dots" id="stageDots"></div><div class="card-grid" id="cardGrid"></div>
        <div class="dock">
            <button class="itm" id="btnHint">💡<span class="cnt" id="hintCnt">2</span></button>
            <button class="itm" id="btnShuffle">🔀<span class="cnt" id="shuffleCnt">2</span></button>
            <button class="itm" id="btnBomb">💣<span class="cnt" id="bombCnt">1</span></button>
            <button class="itm" id="btnShare">📢+3步</button>
        </div>
    </div>
    <div id="modalContainer"></div><div id="toastContainer"></div>
</div>

<script>
(function(){
    var $=function(id){return document.getElementById(id);};
    var PREF='pgV30_',RNK='rnkV30',APW='apw30';
    var ia2=false,ig2=false,pn='';
    var cr=0,cs=0,ts=0,cds=[],si2=null,mv=8,hn=2,sn=2,bn=1;
    var ga=false,pc=false,ri=[],us={},rc2={},ra={};
    var ax=null;
    function iA(){if(!ax)try{ax=new AudioContext();}catch(e){}if(ax&&ax.state==='suspended')ax.resume();}
    function tn(f,t,d,v){if(!ax)return;var o=ax.createOscillator(),g=ax.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v||0.04,ax.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ax.currentTime+d);o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+d);}
    function sc2(){tn(660,'sine',0.1);tn(880,'sine',0.1,0.07);}function sw2(){tn(250,'square',0.15);}function sco2(){tn(880,'triangle',0.08);tn(1100,'triangle',0.08,0.06);tn(1320,'triangle',0.1,0.08);}

    function initCosmic(id){var c=$(id);if(!c)return;c.innerHTML='';for(var i=0;i<70;i++){var d=document.createElement('div');d.className='star-particle';var s=Math.random()*2+0.5;d.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+s+'px;height:'+s+'px;--d:'+(Math.random()*3+2)+'s;--dl:'+Math.random()*3+'s;';c.appendChild(d);}for(var j=0;j<3;j++){var sh=document.createElement('div');sh.className='shooting-star';sh.style.cssText='left:'+(60+Math.random()*30)+'%;top:'+(10+Math.random()*30)+'%;--dl:'+(Math.random()*4+j*2)+'s;';c.appendChild(sh);}}
    initCosmic('loginCosmicBg');initCosmic('adminCosmicBg');initCosmic('coverCosmicBg');

    function sp(){var d={cr:cr,cs:cs,ts:ts,hn:hn,sn:sn,bn:bn,us:us,rc:rc2,ra:ra,ia:ia2,iga:ig2};localStorage.setItem(PREF+pn,JSON.stringify(d));if(pn)localStorage.setItem('lu4',pn);}
    function lp(){if(!pn)return false;var s=localStorage.getItem(PREF+pn);if(s){try{var d=JSON.parse(s);cr=d.cr||0;cs=d.cs||0;ts=d.ts||0;hn=d.hn??2;sn=d.sn??2;bn=d.bn??1;us=d.us||{};rc2=d.rc||{};ra=d.ra||{};ia2=d.ia||false;ig2=d.iga||false;return true;}catch(e){}}return false;}
    function gR(){var s=localStorage.getItem(RNK);return s?JSON.parse(s):{users:{}};}
    function sR(r){localStorage.setItem(RNK,JSON.stringify(r));}
    function cA(){return RMS.every(function(r){return rc2[r.id];});}
    function ru(idx){if(ig2||ia2||rc2[idx]||rc2[idx-1]||idx===0)return true;return(us[RMS[idx-1]?RMS[idx-1].id:0]||0)>=(RMS[idx-1]?RMS[idx-1].tS:0);}
    function rcc(idx){return rc2[idx]||(us[idx]||0)>=RMS[idx].tS;}
    function utl(){document.querySelectorAll('.planet-spiral').forEach(function(p){var ri=parseInt(p.dataset.room);p.classList.remove('locked','completed');if(rcc(ri))p.classList.add('completed');else if(!ru(ri))p.classList.add('locked');});}
    function uS(n,sc){var r=gR();if(!r.users[n])r.users[n]={name:n,score:0};if(sc>r.users[n].score)r.users[n].score=sc;sR(r);}
    function t(msg){$('toastContainer').innerHTML='<div class="toast">'+msg+'</div>';setTimeout(function(){$('toastContainer').innerHTML='';},2000);}
